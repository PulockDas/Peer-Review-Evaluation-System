{% extends "base.html" %}

{% block title %}Login · Academic Peer Review{% endblock %}

{% block content %}
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
      <div class="card border-0 shadow-sm">
        <div class="card-body p-4">
          <h1 class="h4 mb-3 text-center">Sign in</h1>
          {% if form.errors %}
            <div class="alert alert-danger small">
              Please check your username and password and try again.
            </div>
          {% endif %}
          <form method="post" novalidate>
            {% csrf_token %}
            <div class="mb-3">
              <label for="id_username" class="form-label">Username</label>
              <input type="text" name="username" autofocus required class="form-control" id="id_username">
            </div>
            <div class="mb-3">
              <label for="id_password" class="form-label">Password</label>
              <input type="password" name="password" required class="form-control" id="id_password">
            </div>
            <button type="submit" class="btn btn-primary w-100">
              Log in
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
