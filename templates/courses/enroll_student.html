{% extends "base.html" %}

{% block title %}Enroll student · Academic Peer Review{% endblock %}

{% block content %}
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h4 mb-0">Enroll student</h1>
        <a class="btn btn-outline-secondary" href="{% url 'courses:detail' view.course.pk %}">Back</a>
      </div>

      <div class="card border-0 shadow-sm">
        <div class="card-body p-4">
          <form method="post" novalidate>
            {% csrf_token %}
            <div class="mb-3">
              <label class="form-label" for="{{ form.student.id_for_label }}">Student</label>
              {{ form.student }}
              {% if form.student.errors %}<div class="text-danger small mt-1">{{ form.student.errors }}</div>{% endif %}
              <div class="form-text">Only users with role <strong>Student</strong> appear here.</div>
            </div>
            <button type="submit" class="btn btn-primary">Enroll</button>
          </form>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
